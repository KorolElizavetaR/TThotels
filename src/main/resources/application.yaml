spring:
  application:
    name: TThotels

  datasource:
    url: jdbc:h2:mem:tthotels
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging.level:
  root: info
  koroler.TThotels: TRACE

server.port: 8092
mapstruct.verbose: true
